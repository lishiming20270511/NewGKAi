# =============================================
# Nginx configuration for gaokao.lumenaistudio.co
# Production: /etc/nginx/sites-enabled/gaokao
# =============================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name gaokao.lumenaistudio.co;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# IP-direct access (HTTP, for health checks and internal tools)
server {
    listen 80;
    server_name 121.41.69.234 localhost 127.0.0.1;

    root /www/wwwroot/gaokao.lumenaistudio.co;
    index index.html;

    location /auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS main server
server {
    listen 443 ssl;
    server_name gaokao.lumenaistudio.co;
    root /www/wwwroot/gaokao.lumenaistudio.co;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/radar.lumenaistudio.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/radar.lumenaistudio.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security 'max-age=31536000' always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Auth + Deduction
    location /auth/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # Recommendation results must not be cached by proxy
        add_header Cache-Control "no-store" always;
    }

    # Admin backend
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # Crawler Gateway (T1.1) — restricted to crawler server IP only
    location /internal/ {
        allow 199.193.126.80;
        deny all;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Static frontend
    location / {
        try_files $uri $uri/ /index.html;
        # Cache static data files (school_data.js etc.)
        location ~* \.(js|css)$ {
            add_header Cache-Control "public, max-age=3600";
        }
    }
}
