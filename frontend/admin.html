<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI高考志愿规划师 · 管理后台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-danger:#EF4444;--color-info:#3B82F6;--color-success:#22C55E;--color-accent:#818CF8;
  --bg-primary:#0F172A;--bg-card:#1E293B;--bg-card-hover:#334155;--bg-input:#0F172A;
  --text-primary:#F1F5F9;--text-secondary:#94A3B8;--text-muted:#64748B;
  --border:rgba(148,163,184,0.10);--border-subtle:rgba(148,163,184,0.15);
  --radius-sm:6px;--radius-md:10px;--radius-lg:16px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);
  --transition:all .18s ease;
  color-scheme:dark;
}
body{background:var(--bg-primary);min-height:100vh;font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;color:var(--text-primary)}

/* ── Layout ── */
.page-header{background:#0A0F1E;border-bottom:1px solid var(--border);color:var(--text-primary);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.page-header h1{font-size:16px;font-weight:700}
.header-right{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-secondary)}
.main{max-width:1100px;margin:0 auto;padding:24px 16px}

/* ── Login ── */
.login-wrap{max-width:360px;margin:80px auto;background:var(--bg-card);border-radius:var(--radius-lg);padding:32px;box-shadow:var(--shadow-md);border:1px solid var(--border-subtle)}
.login-wrap h2{font-size:20px;font-weight:700;margin-bottom:4px}
.login-wrap p{color:var(--text-secondary);font-size:13px;margin-bottom:24px}

/* ── Tabs ── */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{background:none;border:none;padding:10px 20px;font-size:14px;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;transition:var(--transition);font-weight:500}
.tab-btn.active{color:var(--color-accent);border-bottom-color:var(--color-accent);font-weight:600}

/* ── Card ── */
.card{background:var(--bg-card);border-radius:var(--radius-md);padding:20px;border:1px solid var(--border);margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}

/* ── Form ── */
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:4px}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border-subtle);border-radius:var(--radius-sm);font-size:14px;outline:none;transition:var(--transition);background:var(--bg-input);color:var(--text-primary)}
.form-input:focus{border-color:var(--color-accent);box-shadow:0 0 0 3px rgba(129,140,248,.15)}
.form-error{font-size:12px;color:var(--color-danger);margin-top:4px;display:none}
.form-error.show{display:block}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:14px;font-weight:500;transition:var(--transition)}
.btn-primary{background:var(--color-accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-danger{background:var(--color-danger);color:#fff}
.btn-danger:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border-subtle)}
.btn-ghost:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.btn-sm{padding:4px 12px;font-size:12px}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;color:var(--text-primary)}
th{background:rgba(15,23,42,.8);font-weight:600;color:var(--text-muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
tr:hover td{background:rgba(148,163,184,.04)}
.status-active{color:var(--color-success);font-weight:600}
.status-disabled{color:var(--color-danger);font-weight:600}
.action-group{display:flex;gap:6px;flex-wrap:wrap}

/* ── Pagination ── */
.pagination{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:12px;font-size:13px;color:var(--text-secondary)}
.pagination button{border:1px solid var(--border-subtle);background:var(--bg-card);color:var(--text-secondary);padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px}
.pagination button:disabled{opacity:.4;cursor:not-allowed}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border-radius:var(--radius-lg);padding:24px;width:360px;max-width:90vw;box-shadow:var(--shadow-md);border:1px solid var(--border-subtle)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text-primary)}
.modal p{color:var(--text-secondary);font-size:13px;margin-bottom:10px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.reset-result{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:var(--radius-sm);padding:14px;text-align:center;margin-top:12px;display:none}
.reset-result.show{display:block}
.reset-result .pwd-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.reset-result .pwd-value{font-family:monospace;font-size:20px;font-weight:700;color:var(--color-success);letter-spacing:3px}
.reset-result .pwd-note{font-size:11px;color:var(--text-muted);margin-top:6px}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}

/* ── Toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--bg-card-hover);color:var(--text-primary);padding:10px 20px;border-radius:24px;font-size:13px;opacity:0;transition:var(--transition);pointer-events:none;z-index:999;white-space:nowrap;border:1px solid var(--border-subtle)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:#166534;border-color:rgba(34,197,94,.3)}
.toast.error{background:#991B1B;border-color:rgba(239,68,68,.3)}
</style>
</head>
<body>

<!-- Header -->
<div class="page-header" id="siteHeader">
  <h1>⚙️ AI高考志愿规划师 · 管理后台</h1>
  <div class="header-right" id="headerRight" style="display:none">
    <span id="headerAdmin"></span>
    <button class="btn btn-ghost btn-sm" onclick="openModal('changePassword')">🔑 修改密码</button>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">退出登录</button>
  </div>
</div>

<!-- Login -->
<div class="main" id="loginSection">
  <div class="login-wrap">
    <h2>🔐 管理员登录</h2>
    <p>请使用管理员账号登录</p>
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" id="loginUser" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input class="form-input" id="loginPass" type="password" placeholder="管理员密码" autocomplete="current-password">
    </div>
    <div class="form-error" id="loginErr"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" id="btnLogin" onclick="doLogin()">登录</button>
  </div>
</div>

<!-- Main Panel -->
<div class="main" id="mainSection" style="display:none">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="streamers" onclick="switchTab('streamers')">主播管理</button>
    <button class="tab-btn" data-tab="orders" onclick="switchTab('orders')">订单查看</button>
    <button class="tab-btn" data-tab="config" onclick="switchTab('config')">系统配置</button>
    <button class="tab-btn" data-tab="crawl" onclick="switchTab('crawl')">数据爬取</button>
    <button class="tab-btn" data-tab="links" onclick="switchTab('links')">🔗 一次性链接</button>
    <button class="tab-btn" data-tab="scripts" onclick="switchTab('scripts')">📝 话术管理</button>
  </div>

  <!-- Streamers Tab -->
  <div id="tab-streamers">
    <div class="card">
      <div class="card-title">
        主播列表
        <button class="btn btn-primary btn-sm" onclick="openModal('createStreamer')">+ 新增主播</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>手机号</th><th>姓名</th><th>剩余次数</th><th>累计购买</th><th>已使用</th><th>状态</th><th>操作</th></tr></thead>
          <tbody id="streamersTbody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <button id="prevStreamers" onclick="loadStreamers(-1)" disabled>上一页</button>
        <span id="streamerPageInfo">1 / 1</span>
        <button id="nextStreamers" onclick="loadStreamers(1)" disabled>下一页</button>
      </div>
    </div>
  </div>

  <!-- Orders Tab -->
  <div id="tab-orders" style="display:none">
    <div class="card">
      <div class="card-title">订单记录</div>
      <div class="filter-bar">
        <input class="form-input" id="filterDate" type="date" style="width:160px">
        <button class="btn btn-primary btn-sm" onclick="loadOrders(0)">查询</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('filterDate').value='';loadOrders(0)">重置</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>订单号</th><th>主播</th><th>考生昵称</th><th>省份</th><th>分数</th><th>时间</th><th>状态</th><th>操作</th></tr></thead>
          <tbody id="ordersTbody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <button id="prevOrders" onclick="loadOrders(-1)" disabled>上一页</button>
        <span id="ordersPageInfo">1 / 1</span>
        <button id="nextOrders" onclick="loadOrders(1)" disabled>下一页</button>
      </div>
    </div>
  </div>

  <!-- Crawl Dashboard Tab -->
  <div id="tab-crawl" style="display:none">
    <div class="card">
      <div class="card-title">
        数据爬取进度
        <button class="btn btn-ghost btn-sm" onclick="loadCrawlProgress()">↻ 刷新</button>
      </div>
      <div id="crawlGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:4px 0"></div>
    </div>
  </div>

  <!-- One-Time Links Tab -->
  <div id="tab-links" style="display:none">
    <div class="card">
      <div class="card-title">生成一次性链接</div>
      <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">批次备注（选填）</label>
          <input class="form-input" id="linkNote" placeholder="如：6月19日10人团购" maxlength="50" style="width:220px">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">生成数量</label>
          <input class="form-input" id="linkCount" type="number" value="10" min="1" max="100" style="width:100px">
        </div>
        <button class="btn btn-primary" id="btnGenLinks" onclick="generateLinks()">✨ 立即生成</button>
      </div>
      <div id="linksGenResult" style="display:none;margin-top:16px;background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.2);border-radius:var(--radius-md);padding:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <strong id="linksGenTitle"></strong>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="copyAllLinks()">📋 一键复制全部</button>
            <button class="btn btn-ghost btn-sm" onclick="downloadLinks()">⬇ 下载TXT</button>
          </div>
        </div>
        <div id="linksGenList" style="max-height:240px;overflow-y:auto;font-size:12px;font-family:monospace;background:rgba(0,0,0,.2);border-radius:6px;padding:10px;line-height:1.8"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">
        批次状态看板
        <button class="btn btn-ghost btn-sm" onclick="loadLinkBatches(0)">↻ 刷新</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>批次ID</th><th>备注</th><th>生成时间</th><th>总数</th><th>已用</th><th>未用</th><th>已作废</th><th>操作</th></tr></thead>
          <tbody id="linkBatchesTbody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <button id="prevLinks" onclick="loadLinkBatches(-1)" disabled>上一页</button>
        <span id="linksPageInfo">1 / 1</span>
        <button id="nextLinks" onclick="loadLinkBatches(1)" disabled>下一页</button>
      </div>
    </div>
  </div>

  <!-- Scripts Management Tab -->
  <div id="tab-scripts" style="display:none">
    <div class="card">
      <div class="card-title">
        话术分类
        <button class="btn btn-primary btn-sm" onclick="openScriptModal()">+ 新增话术</button>
      </div>
      <div id="scriptsContainer"></div>
    </div>
  </div>

  <!-- Config Tab -->
  <div id="tab-config" style="display:none">
    <div class="card">
      <div class="card-title">概率阈值配置</div>
      <div style="max-width:400px">
        <div class="form-group">
          <label class="form-label">冲刺下限（%，默认 30）</label>
          <input class="form-input" id="cfgBoostMin" type="number" value="30" style="width:120px">
        </div>
        <div class="form-group">
          <label class="form-label">稳妥下限（%，默认 60）</label>
          <input class="form-input" id="cfgSolidMin" type="number" value="60" style="width:120px">
        </div>
        <div class="form-group">
          <label class="form-label">保底下限（%，默认 85）</label>
          <input class="form-input" id="cfgSafeMin" type="number" value="85" style="width:120px">
        </div>
        <button class="btn btn-primary" style="margin-top:8px" onclick="saveConfig()">保存配置</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Recharge -->
<div class="modal-overlay" id="modal-recharge">
  <div class="modal">
    <h3>💰 充值次数</h3>
    <p id="rechargeTarget" style="font-size:13px;color:var(--text-secondary);margin-bottom:12px"></p>
    <div class="form-group">
      <label class="form-label">充值次数</label>
      <input class="form-input" type="number" id="rechargeCount" value="10" min="1" oninput="calcAmt()">
    </div>
    <div class="form-group">
      <label class="form-label">充值金额（元，仅记录）</label>
      <input class="form-input" type="number" id="rechargeAmount" value="299" oninput="calcCount()">
    </div>
    <div class="form-group">
      <label class="form-label">备注（可选）</label>
      <input class="form-input" id="rechargeRemark" placeholder="如：微信转账">
    </div>
    <div class="form-error" id="rechargeErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('recharge')">取消</button>
      <button class="btn btn-primary" id="btnDoRecharge" onclick="doRecharge()">确认充值</button>
    </div>
  </div>
</div>

<!-- Modal: Create Streamer -->
<div class="modal-overlay" id="modal-createStreamer">
  <div class="modal">
    <h3>➕ 新增主播</h3>
    <div class="form-group">
      <label class="form-label">手机号</label>
      <input class="form-input" id="newPhone" maxlength="11" placeholder="11位手机号">
    </div>
    <div class="form-group">
      <label class="form-label">姓名 / 昵称</label>
      <input class="form-input" id="newName" maxlength="64" placeholder="主播昵称">
    </div>
    <div class="form-group">
      <label class="form-label">初始密码</label>
      <input class="form-input" id="newPassword" type="password" placeholder="至少6位">
    </div>
    <div class="form-error" id="createErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('createStreamer')">取消</button>
      <button class="btn btn-primary" id="btnDoCreate" onclick="doCreateStreamer()">创建</button>
    </div>
  </div>
</div>

<!-- Modal: Change Password -->
<div class="modal-overlay" id="modal-changePassword">
  <div class="modal">
    <h3>🔑 修改密码</h3>
    <div class="form-group">
      <label class="form-label">当前密码</label>
      <input class="form-input" type="password" id="cpOldPass" placeholder="请输入当前密码" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label class="form-label">新密码</label>
      <input class="form-input" type="password" id="cpNewPass" placeholder="6-20位" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label">确认新密码</label>
      <input class="form-input" type="password" id="cpConfirmPass" placeholder="再次输入新密码" autocomplete="new-password">
    </div>
    <div class="form-error" id="cpErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('changePassword')">取消</button>
      <button class="btn btn-primary" id="btnDoChangePwd" onclick="doChangePassword()">确认修改</button>
    </div>
  </div>
</div>

<!-- Modal: Reset Streamer Password -->
<div class="modal-overlay" id="modal-resetPassword">
  <div class="modal">
    <h3>🔄 重置主播密码</h3>
    <p id="resetPwdTarget">确认重置该主播的密码？系统将生成随机新密码。</p>
    <div class="reset-result" id="resetResult">
      <div class="pwd-label">新密码（请立即告知主播）</div>
      <div class="pwd-value" id="resetPwdValue">—</div>
      <div class="pwd-note">⚠ 此密码仅显示一次，请妥善记录</div>
    </div>
    <div class="form-error" id="resetPwdErr"></div>
    <div class="modal-actions" id="resetPwdActions">
      <button class="btn btn-ghost" onclick="closeModal('resetPassword')">取消</button>
      <button class="btn btn-danger" id="btnDoReset" onclick="doResetPassword()">确认重置</button>
    </div>
  </div>
</div>

<!-- Modal: Batch Detail -->
<div class="modal-overlay" id="modal-batchDetail">
  <div class="modal" style="width:560px;max-width:95vw">
    <h3>🔗 批次链接详情</h3>
    <div class="table-wrap" style="max-height:360px;overflow-y:auto">
      <table>
        <thead><tr><th>令牌前8位</th><th>状态</th><th>使用时间</th></tr></thead>
        <tbody id="batchDetailTbody"></tbody>
      </table>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('batchDetail')">关闭</button>
    </div>
  </div>
</div>

<!-- Modal: Confirm Revoke Batch -->
<div class="modal-overlay" id="modal-revokeBatch">
  <div class="modal">
    <h3>⚠️ 作废整批链接</h3>
    <p id="revokeBatchMsg"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('revokeBatch')">取消</button>
      <button class="btn btn-danger" id="btnDoRevoke" onclick="doRevokeBatch()">确认作废</button>
    </div>
  </div>
</div>

<!-- Modal: Create/Edit Script -->
<div class="modal-overlay" id="modal-scriptEdit">
  <div class="modal" style="width:520px;max-width:95vw">
    <h3 id="scriptModalTitle">新增话术</h3>
    <div class="form-group">
      <label class="form-label">分类</label>
      <select class="form-input" id="scriptCategory" onchange="onCategoryChange(this)">
        <option value="__new__">+ 新建分类</option>
      </select>
      <input class="form-input" id="scriptCategoryNew" placeholder="输入新分类名" style="margin-top:6px;display:none">
    </div>
    <div class="form-group">
      <label class="form-label">标题（必填）</label>
      <input class="form-input" id="scriptTitle" maxlength="128" placeholder="话术标题">
    </div>
    <div class="form-group">
      <label class="form-label">话术内容（必填）</label>
      <textarea class="form-input" id="scriptContent" rows="5" maxlength="2000" placeholder="话术正文内容…" style="resize:vertical"></textarea>
    </div>
    <div class="form-error" id="scriptErr"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('scriptEdit')">取消</button>
      <button class="btn btn-primary" id="btnSaveScript" onclick="saveScript()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const S = {
  token: null,
  streamerPage: 1,
  streamerTotal: 0,
  ordersPage: 1,
  ordersTotal: 0,
  rechargeTargetId: null,
  resetTargetId: null,
};
const PAGE_SIZE = 20;

// ── Init ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  S.token = localStorage.getItem('gk_admin_token');
  if (S.token) showMain();
  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

// ── API ──────────────────────────────────────────────────
async function api(method, path, body, isLoginReq) {
  const headers = { 'Content-Type': 'application/json' };
  if (S.token) headers['Authorization'] = 'Bearer ' + S.token;
  const res = await fetch(path, {
    method,
    headers,
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) {
    const errData = await res.json().catch(() => ({}));
    if (isLoginReq) {
      throw new Error(errData.detail || '用户名或密码错误');
    }
    doLogout();
    throw new Error('登录已过期，请重新登录');
  }
  if (res.status === 204) return null;
  const data = await res.json().catch(() => ({ detail: '服务器无响应' }));
  if (!res.ok) throw new Error(data.detail || `请求失败 (${res.status})`);
  return data;
}

// ── Crawl Dashboard ───────────────────────────────────────
function buildCrawlCard(t) {
  const pct = t.total > 0 ? Math.round(t.done / t.total * 100) : 0;
  const barColor = pct >= 80 ? '#22d3ee' : pct >= 40 ? '#818cf8' : '#f59e0b';
  const card = document.createElement('div');
  card.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px';

  const header = document.createElement('div');
  header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
  const titleEl = document.createElement('span');
  titleEl.style.cssText = 'font-weight:600;font-size:14px';
  titleEl.textContent = t.label;
  const countEl = document.createElement('span');
  countEl.style.cssText = 'font-size:12px;color:var(--text-secondary)';
  countEl.textContent = t.done + '/' + t.total;
  header.appendChild(titleEl);
  header.appendChild(countEl);

  const track = document.createElement('div');
  track.style.cssText = 'height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:8px';
  const bar = document.createElement('div');
  bar.style.cssText = 'height:100%;border-radius:3px;transition:width .4s;background:' + barColor + ';width:' + pct + '%';
  track.appendChild(bar);

  const stats = document.createElement('div');
  stats.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;font-size:11px';
  [['待处理 ' + t.pending, '#94a3b8'], ['运行中 ' + t.running, '#818cf8'],
   ['完成 ' + t.done, '#22d3ee'],    ['失败 ' + t.failed, '#f87171']].forEach(([txt, color]) => {
    const s = document.createElement('span');
    s.style.color = color;
    s.textContent = txt;
    stats.appendChild(s);
  });

  card.appendChild(header);
  card.appendChild(track);
  card.appendChild(stats);

  if (t.note) {
    const note = document.createElement('div');
    note.style.cssText = 'font-size:11px;color:var(--text-secondary);margin-top:4px';
    note.textContent = t.note;
    card.appendChild(note);
  }
  if (t.failed > 0) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-ghost btn-sm';
    btn.style.cssText = 'margin-top:8px;font-size:11px';
    btn.textContent = '↻ 重试失败任务';
    btn.addEventListener('click', () => retryCrawl(t.key, t.label));
    card.appendChild(btn);
  }
  return card;
}

async function loadCrawlProgress() {
  const grid = document.getElementById('crawlGrid');
  const loading = document.createElement('div');
  loading.style.cssText = 'color:var(--text-secondary);padding:12px';
  loading.textContent = '加载中…';
  grid.replaceChildren(loading);
  try {
    const data = await api('GET', '/admin/crawl/progress');
    const tasks = data.tasks || [];
    if (!tasks.length) {
      const empty = document.createElement('div');
      empty.style.cssText = 'color:var(--text-secondary);padding:12px';
      empty.textContent = '暂无爬取任务';
      grid.replaceChildren(empty);
      return;
    }
    grid.replaceChildren(...tasks.map(buildCrawlCard));
  } catch(e) {
    const errEl = document.createElement('div');
    errEl.style.cssText = 'color:var(--color-danger);padding:12px';
    errEl.textContent = e.message;
    grid.replaceChildren(errEl);
  }
}

// ── Toast ────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Escape ───────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

  const count = parseInt(document.getElementById('linkCount').value) || 0;
  if (count < 1 || count > 100) { showToast('数量须在 1-100 之间', 'error'); return; }
  const btn = document.getElementById('btnGenLinks');
  btn.disabled = true; btn.textContent = '生成中…';
  try {
    const data = await api('POST', '/admin/one-time-links/generate', { note: note || null, count });
    _genLinks = data.links || [];
    _genNote = note || `批次${data.batch_id}`;
    document.getElementById('linksGenTitle').textContent = `已生成 ${_genLinks.length} 个链接`;
    const listEl = document.getElementById('linksGenList');
    listEl.innerHTML = _genLinks.map((l, i) => `<div>${i+1}. ${esc(l)}</div>`).join('');
    document.getElementById('linksGenResult').style.display = '';
    showToast(`已生成 ${_genLinks.length} 个链接`, 'success');
    loadLinkBatches(0);
  } catch(e) { showToast(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '✨ 立即生成'; }

function copyAllLinks() {
  if (!_genLinks.length) return;
  navigator.clipboard.writeText(_genLinks.join('\n')).then(() => showToast('已复制全部链接', 'success'));
}

function downloadLinks() {
  if (!_genLinks.length) return;
  const content = _genLinks.join('\n');
  const date = new Date().toISOString().slice(0,10);
  const fname = `链接批次_${_genNote}_${date}.txt`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type:'text/plain;charset=utf-8'}));
  a.download = fname;
  a.click();
}

    }
    container.innerHTML = '';
    _scriptCategories.forEach(cat => {
      const scripts = (data.scripts || {})[cat] || [];
      const section = buildScriptSection(cat, scripts);
      container.appendChild(section);
    });
  } catch(e) {
    container.innerHTML = `<div style="color:var(--color-danger);padding:12px">${esc(e.message)}</div>`;
  }
}

function buildScriptSection(category, scripts) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius-md)';

  const header = document.createElement('div');
  header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(129,140,248,.06);cursor:pointer;border-radius:var(--radius-md)';
  header.innerHTML = `<strong style="font-size:14px">${esc(category)} (${scripts.length}条)</strong>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="openScriptModal(null,'${esc(category)}');event.stopPropagation()">+ 新增</button>
      <button class="btn btn-danger btn-sm" onclick="deleteCategory('${esc(category)}');event.stopPropagation()">删除分类</button>
    </div>`;

  const body = document.createElement('div');
  body.style.cssText = 'padding:0 16px 12px';
  if (!scripts.length) {
    body.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:10px 0">该分类暂无话术</div>';
  } else {
    const tbl = document.createElement('table');
    tbl.style.cssText = 'width:100%;margin-top:8px';
    tbl.innerHTML = `<thead><tr><th>#</th><th>标题</th><th>内容预览</th><th>状态</th><th>操作</th></tr></thead>`;
    const tbody = document.createElement('tbody');
    scripts.forEach((s, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${s.sort_order}</td>
        <td>${esc(s.title)}</td>
        <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary)">${esc((s.content||'').slice(0,60))}…</td>
        <td><span style="color:${s.is_active!==0?'var(--color-success)':'var(--text-muted)'}">${s.is_active!==0?'● 启用':'○ 禁用'}</span></td>
        <td>
          <div class="action-group">
            <button class="btn btn-ghost btn-sm" onclick="openScriptModal(${s.id})">编辑</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleScriptActive(${s.id},${s.is_active})">${s.is_active!==0?'禁用':'启用'}</button>
            <button class="btn btn-ghost btn-sm" onclick="moveScript(${s.id},'up')" ${idx===0?'disabled':''}>↑</button>
            <button class="btn btn-ghost btn-sm" onclick="moveScript(${s.id},'down')" ${idx===scripts.length-1?'disabled':''}>↓</button>
            <button class="btn btn-danger btn-sm" onclick="deleteScript(${s.id})">删除</button>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    body.appendChild(tbl);
  }

  header.addEventListener('click', () => {
    body.style.display = body.style.display === 'none' ? '' : 'none';
  });

  wrap.appendChild(header);
  wrap.appendChild(body);
  return wrap;
}

function openScriptModal(id = null, defaultCategory = '') {
  _editScriptId = id;
  document.getElementById('scriptModalTitle').textContent = id ? '编辑话术' : '新增话术';
  document.getElementById('scriptErr').classList.remove('show');
  document.getElementById('scriptCategoryNew').style.display = 'none';

  const sel = document.getElementById('scriptCategory');
  sel.innerHTML = '<option value="__new__">+ 新建分类</option>';
  _scriptCategories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
  sel.value = defaultCategory || (_scriptCategories[0] || '__new__');

  document.getElementById('scriptTitle').value = '';
  document.getElementById('scriptContent').value = '';

  if (id) {
    // Load existing data
    const allScripts = document.querySelectorAll('[data-script-id]');
    // Try to find from DOM or re-fetch — for simplicity just open blank and user re-types
    // In production, fetch: api('GET', `/admin/scripts/${id}`)
  }
  openModal('scriptEdit');
}

function onCategoryChange(sel) {
  document.getElementById('scriptCategoryNew').style.display =
    sel.value === '__new__' ? '' : 'none';
}

async function saveScript() {
  const catSel = document.getElementById('scriptCategory').value;
  const catNew = document.getElementById('scriptCategoryNew').value.trim();
  const category = catSel === '__new__' ? catNew : catSel;
  const title = document.getElementById('scriptTitle').value.trim();
  const content = document.getElementById('scriptContent').value.trim();
  const errEl = document.getElementById('scriptErr');
  errEl.classList.remove('show');
  if (!category) { errEl.textContent = '请输入分类名'; errEl.classList.add('show'); return; }
  if (!title) { errEl.textContent = '请输入标题'; errEl.classList.add('show'); return; }
  if (!content) { errEl.textContent = '请输入内容'; errEl.classList.add('show'); return; }

  const btn = document.getElementById('btnSaveScript');
  btn.disabled = true;
  try {
    if (_editScriptId) {
      await api('PUT', `/admin/scripts/${_editScriptId}`, { category, title, content });
    } else {
      await api('POST', '/admin/scripts', { category, title, content, sort_order: 0 });
    }
    closeModal('scriptEdit');
    showToast('保存成功', 'success');
    loadScripts();
  } catch(e) { errEl.textContent = e.message; errEl.classList.add('show'); }
  finally { btn.disabled = false; }
}

async function toggleScriptActive(id, currentActive) {
  try {
    await api('PUT', `/admin/scripts/${id}`, { is_active: currentActive !== 0 ? 0 : 1 });
    showToast(currentActive !== 0 ? '已禁用' : '已启用', 'success');
    loadScripts();
  } catch(e) { showToast(e.message, 'error'); }
}

async function moveScript(id, direction) {
  // Find current sort_order by querying all scripts
  try {
    const data = await api('GET', '/admin/scripts');
    let allScripts = [];
    Object.values(data.scripts || {}).forEach(arr => allScripts = allScripts.concat(arr));
    const current = allScripts.find(s => s.id === id);
    if (!current) return;
    const cat = Object.keys(data.scripts).find(c => data.scripts[c].some(s => s.id === id));
    const siblings = (data.scripts[cat] || []).sort((a,b) => a.sort_order - b.sort_order);
    const idx = siblings.findIndex(s => s.id === id);
    if (direction === 'up' && idx > 0) {
      const prev = siblings[idx - 1];
      await api('PUT', `/admin/scripts/${id}/sort`, { sort_order: prev.sort_order });
      await api('PUT', `/admin/scripts/${prev.id}/sort`, { sort_order: current.sort_order });
    } else if (direction === 'down' && idx < siblings.length - 1) {
      const next = siblings[idx + 1];
      await api('PUT', `/admin/scripts/${id}/sort`, { sort_order: next.sort_order });
      await api('PUT', `/admin/scripts/${next.id}/sort`, { sort_order: current.sort_order });
    }
    loadScripts();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteScript(id) {
  if (!confirm('确认删除此话术？')) return;
  try {
    await api('DELETE', `/admin/scripts/${id}`);
    showToast('已删除', 'success');
    loadScripts();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteCategory(name) {
  if (!confirm(`确认删除分类"${name}"？该分类下所有话术将被删除。`)) return;
  try {
    await api('DELETE', `/admin/script-categories/${encodeURIComponent(name)}`);
    showToast(`分类"${name}"已删除`, 'success');
    loadScripts();
  } catch(e) { showToast(e.message, 'error'); }
}
